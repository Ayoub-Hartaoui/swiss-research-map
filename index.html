<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cartographie Suisse - Mode Debug</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sigma.js/1.2.1/sigma.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0b0e14; color: white; font-family: sans-serif; }
        #container { position: absolute; width: 100%; height: 100%; background: #000; }
        #sidebar { 
            position: absolute; left: 15px; top: 15px; width: 280px; 
            background: rgba(30, 30, 30, 0.9); padding: 20px; 
            border: 1px solid #444; border-radius: 8px; z-index: 100;
        }
        #error-log {
            position: absolute; bottom: 10px; right: 10px; color: #ff5555;
            font-family: monospace; font-size: 12px; max-width: 400px;
        }
        .meta { color: #888; font-size: 0.8em; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 id="title">Chargement...</h2>
        <p id="desc">En attente des données Tulip.</p>
        <div id="meta-fields"></div>
    </div>

    <div id="error-log"></div>
    <div id="container"></div>

    <script>
    const log = (msg) => { document.getElementById('error-log').innerHTML += "<div>> " + msg + "</div>"; };

    fetch('data.json')
        .then(res => res.json())
        .then(raw => {
            const data = raw.graph;
            const nodes = [];
            const edges = [];

            log("Fichier JSON chargé. Tentative d'analyse...");

            // Helper to get nested Tulip values
            const getVal = (prop, id, def = "") => {
                try { return data.properties[prop].nodesValues[id] || def; } 
                catch(e) { return def; }
            };

            // 1. PROCESS NODES
            for (let i = 0; i < data.nodesNumber; i++) {
                const id = i.toString();
                
                // Coordinates
                const layout = getVal('viewLayout', id, "(0,0,0)");
                const coords = layout.replace(/[() ]/g, '').split(',');

                // Color (convert (r,g,b,a) to hex)
                const cStr = getVal('viewColor', id, "(200,200,200,255)");
                const rgba = cStr.replace(/[() ]/g, '').split(',');
                const hex = "#" + ((1 << 24) + (parseInt(rgba[0]) << 16) + (parseInt(rgba[1]) << 8) + parseInt(rgba[2])).toString(16).slice(1);

                nodes.push({
                    id: id,
                    label: getVal('viewLabel', id, "Node " + id),
                    x: parseFloat(coords[0]) || 0,
                    y: -parseFloat(coords[1]) || 0, // Invert Y
                    size: 5,
                    color: hex,
                    // Store extra data
                    description: getVal('description', id),
                    contact: getVal('contact', id),
                    groupId: getVal('groupId', id)
                });
            }

            // 2. PROCESS EDGES
            data.edges.forEach((e, i) => {
                edges.push({
                    id: 'e'+i,
                    source: e[0].toString(),
                    target: e[1].toString(),
                    color: '#666'
                });
            });

            log(nodes.length + " nœuds prêts.");

            // 3. START SIGMA
            const s = new sigma({
                graph: { nodes, edges },
                container: 'container',
                settings: { 
                    labelThreshold: 0,
                    defaultNodeColor: '#fff',
                    scalingMode: 'inside'
                }
            });

            // Initial Filter: Hide children
            // 1. INITIAL STATE: Hide ALL children on load
                s.graph.nodes().forEach(function(n) {
                    if (n.groupId && n.groupId.endsWith("_Child")) {
                        n.hidden = true;
                    }
                });
                s.refresh();
                
                // 2. CLICK INTERACTION
                s.bind('clickNode', function(e) {
                const n = e.data.node;
                const groups = n.groupId ? n.groupId.split('|') : [];
            
                // --- LOGIQUE D'EXPANSION MULTI-NIVEAUX ---
                groups.forEach(group => {
                    if (group.endsWith("_Parent")) {
                        const prefix = group.split('_')[0]; 
                        const childTarget = prefix + "_Child";
            
                        s.graph.nodes().forEach(function(node) {
                            // Si le nœud appartient au groupe cible, on bascule sa visibilité
                            if (node.groupId && node.groupId.includes(childTarget)) {
                                node.hidden = !node.hidden;
                            }
                        });
                    }
                });
            
                s.refresh();
        
            // --- MISE À JOUR SIDEBAR ---
            document.getElementById('node-name').innerText = n.label;
            document.getElementById('node-desc').innerHTML = n.description || "";
        });
                    // --- EXPAND/COLLAPSE LOGIC ---
                    // If the group is a "Parent" (e.g., FNS_Parent or SEFRI_Parent)
                    if (group && group.endsWith("_Parent")) {
                        const prefix = group.split('_')[0]; // Gets "FNS" or "SEFRI"
                        const childTarget = prefix + "_Child";
                
                        s.graph.nodes().forEach(function(node) {
                            if (node.groupId === childTarget) {
                                node.hidden = !node.hidden; // Toggle!
                            }
                        });
                        s.refresh();
                    }
                
                    // --- SIDEBAR UPDATE (Make sure to use innerHTML for your URLs!) ---
                    document.getElementById('node-name').innerText = n.label;
                    
                    // We use innerHTML so the <a href> links you added in Tulip actually work!
                    document.getElementById('node-desc').innerHTML = n.description || "Pas de description.";
                    document.getElementById('node-contact').innerHTML = n.contact || "";
                    
                    // Legal Field - Check if it starts with http to make it a link automatically
                    const legalContent = n.cadre_legal || "";
                    if (legalContent.startsWith("http")) {
                        document.getElementById('node-legal').innerHTML = `<a href="${legalContent}" target="_blank">Voir la base légale</a>`;
                    } else {
                        document.getElementById('node-legal').innerText = legalContent;
                    }
                });
            
        })
        .catch(err => {
            log("ERREUR CRITIQUE: " + err.message);
            console.error(err);
        });
    </script>
</body>
</html>
