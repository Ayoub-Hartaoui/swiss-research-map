<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cartographie Recherche Suisse - Interactif</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sigma.js/1.2.1/sigma.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #container { position: absolute; width: 100%; height: 100%; }
        
        #sidebar { 
            position: absolute; left: 20px; top: 20px; width: 320px; 
            background: rgba(22, 27, 34, 0.95); padding: 20px; 
            border: 1px solid #30363d; border-radius: 10px; z-index: 10;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        h2 { color: #58a6ff; margin-top: 0; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .info-box { margin-bottom: 15px; }
        .label { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; font-weight: bold; }
        .content { font-size: 0.95rem; color: #c9d1d9; margin-top: 4px; line-height: 1.4; }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .hint { font-size: 0.8rem; color: #f0883e; font-style: italic; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 id="node-name">Explorateur</h2>
        <div id="details">
            <div class="info-box">
                <div class="label">Description</div>
                <div id="node-desc" class="content">Sélectionnez un nœud pour voir les détails.</div>
            </div>
            <div id="contact-area" class="info-box" style="display:none;">
                <div class="label">Contact</div>
                <div id="node-contact" class="content"></div>
            </div>
            <div id="legal-area" class="info-box" style="display:none;">
                <div class="label">Cadre Légal</div>
                <div id="node-legal" class="content"></div>
            </div>
            <div id="gov-area" class="info-box" style="display:none;">
                <div class="label">Gouvernance</div>
                <div class="content"><a id="node-gov" href="#" target="_blank">Lien vers le document</a></div>
            </div>
            <p id="hint-msg" class="hint" style="display:none;">💡 Cliquez à nouveau sur FNS pour masquer les comités.</p>
        </div>
    </div>

    <div id="container"></div>

    <script>
    // 1. Fetch the Tulip JSON
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            const tulip = data.graph;
            const sigmaData = { nodes: [], edges: [] };

            // 2. PARSE NODES (Transform Tulip properties to Sigma format)
            for (let i = 0; i < tulip.nodesNumber; i++) {
                const id = i.toString();
                
                // Extract coordinates from viewLayout "(x,y,z)"
                const layout = tulip.properties.viewLayout.nodesValues[id] || "(0,0,0)";
                const coords = layout.replace(/[()]/g, '').split(',');

                // Extract color from viewColor "(r,g,b,a)"
                const colorStr = tulip.properties.viewColor.nodesValues[id] || "(200,200,200,255)";
                const rgba = colorStr.replace(/[()]/g, '').split(',');
                const hexColor = "#" + ((1 << 24) + (parseInt(rgba[0]) << 16) + (parseInt(rgba[1]) << 8) + parseInt(rgba[2])).toString(16).slice(1);

                // Build Sigma Node
                sigmaData.nodes.push({
                    id: id,
                    label: tulip.properties.viewLabel.nodesValues[id] || id,
                    x: parseFloat(coords[0]),
                    y: -parseFloat(coords[1]), // Flip Y for web standard
                    size: parseFloat(tulip.properties.viewSize.nodesValues[id]?.split(',')[0].replace('(', '') || 3),
                    color: hexColor,
                    // Metadata
                    description: tulip.properties.description.nodesValues[id] || "",
                    contact: tulip.properties.contact.nodesValues[id] || "",
                    cadre_legal: tulip.properties.cadre_legal.nodesValues[id] || "",
                    gouvernance: tulip.properties.gouvernance.nodesValues[id] || "",
                    groupId: tulip.properties.groupId.nodesValues[id] || "",
                    type: (tulip.properties.viewShape.nodesValues[id] === "4") ? 'square' : 'circle'
                });
            }

            // 3. PARSE EDGES
            tulip.edges.forEach((e, index) => {
                sigmaData.edges.push({
                    id: 'e' + index,
                    source: e[0].toString(),
                    target: e[1].toString(),
                    color: '#444'
                });
            });

            // 4. INITIALIZE SIGMA
            const s = new sigma({
                graph: sigmaData,
                container: 'container',
                settings: {
                    defaultNodeColor: '#ec5148',
                    edgeColor: 'default',
                    labelThreshold: 0,
                    minArrowSize: 10
                }
            });

            // 5. INTERACTION LOGIC
            // Hide FNS children by default
            s.graph.nodes().forEach(n => {
                if (n.groupId === "FNS_Child") n.hidden = true;
            });
            s.refresh();

            s.bind('clickNode', function(e) {
                const n = e.data.node;

                // Toggle logic for FNS
                if (n.groupId === "FNS_Parent") {
                    s.graph.nodes().forEach(node => {
                        if (node.groupId === "FNS_Child") node.hidden = !node.hidden;
                    });
                    document.getElementById('hint-msg').style.display = 'block';
                    s.refresh();
                }

                // Update Sidebar
                document.getElementById('node-name').innerText = n.label;
                document.getElementById('node-desc').innerText = n.description || "Pas de description.";
                
                // Show/Hide fields based on content
                toggleField('contact-area', 'node-contact', n.contact);
                toggleField('legal-area', 'node-legal', n.cadre_legal);
                
                const govArea = document.getElementById('gov-area');
                if(n.gouvernance) {
                    govArea.style.display = "block";
                    document.getElementById('node-gov').href = n.gouvernance;
                } else {
                    govArea.style.display = "none";
                }
            });

            function toggleField(areaId, textId, value) {
                const area = document.getElementById(areaId);
                if (value && value !== "") {
                    area.style.display = "block";
                    document.getElementById(textId).innerText = value;
                } else {
                    area.style.display = "none";
                }
            }
        });
    </script>
</body>
</html>
