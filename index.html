<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cartographie Recherche Suisse</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sigma.js/1.2.1/sigma.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sigma.js/1.2.1/plugins/sigma.parsers.json.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e14; color: white; overflow: hidden; }
        #container { position: absolute; width: 100%; height: 100%; }
        
        #sidebar { 
            position: absolute; left: 20px; top: 20px; width: 320px; 
            background: rgba(23, 27, 34, 0.95); padding: 20px; 
            border: 1px solid #30363d; border-radius: 12px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 10;
        }

        h2 { color: #58a6ff; margin-top: 0; }
        .meta-label { font-weight: bold; color: #8b949e; display: block; margin-top: 15px; text-transform: uppercase; font-size: 0.8em; }
        .description { line-height: 1.5; color: #c9d1d9; }
        .btn-link { 
            display: inline-block; margin-top: 20px; padding: 10px 15px; 
            background: #238636; color: white; text-decoration: none; border-radius: 6px; 
        }
        .btn-link:hover { background: #2ea043; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2 id="node-name">Explorateur de Données</h2>
        <p class="description">Cliquez sur un bureau ou une personne pour voir les missions et les liens de durabilité.</p>
        
        <div id="details" style="display:none;">
            <span class="meta-label">Mission / Description</span>
            <div id="node-desc" class="description"></div>
            
            <span class="meta-label">Ressources</span>
            <a id="node-url" class="btn-link" target="_blank">Ouvrir le portail</a>
        </div>
    </div>

    <div id="container"></div>

    <script>
        sigma.parsers.json('data.json', {
            container: 'container',
            settings: {
                defaultNodeColor: '#58a6ff',
                edgeColor: 'default',
                defaultEdgeColor: '#30363d',
                labelColor: 'node',
                labelThreshold: 0, // Shows labels even when zoomed out
                minNodeSize: 5,
                maxNodeSize: 15
            }
        }, function(s) {
            s.bind('clickNode', function(e) {
                const node = e.data.node;
                document.getElementById('details').style.display = 'block';
                document.getElementById('node-name').innerText = node.label;
                
                // This checks for both 'description' OR 'info' from your JSON
                document.getElementById('node-desc').innerText = node.description || node.info || "Aucune description disponible.";
                
                const linkElement = document.getElementById('node-url');
                if(node.url || node.link) {
                    linkElement.style.display = 'inline-block';
                    linkElement.href = node.url || node.link;
                } else {
                    linkElement.style.display = 'none';
                }
            });
            
            // This forces the graph to center itself
            s.refresh();
            s.cameras[0].goTo({ x: 0, y: 0, angle: 0, ratio: 1.2 });
        });
